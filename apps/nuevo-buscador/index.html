<!DOCTYPE html>
<html lang="es" data-theme="light">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buscador de Conciertos Flamencos - Duende Finder</title>
    <meta name="description" content="Descubre la magia del flamenco. Busca conciertos, tablaos y festivales por todo el Mundo.">
    <meta property="og:image" content="https://www.afland.es/wp-content/uploads/2024/04/DUENDE-FINDER-LOGO-1200-X-630-PX.png">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Inter:wght@400;700;900&family=Montserrat:wght@700&display=swap" rel="stylesheet">

    <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
    <script nomodule src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"></script>

    <link rel="icon" type="image/png" href="assets/favicon.png">
    <link rel="manifest" href="/assets/manifest.json">
    <meta name="theme-color" content="#121212">

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>

    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="chatbot.css">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>

<body>

    <header class="header-main">
        <div class="container">
            <h1 class="main-title">Duende Finder</h1>
            <p id="event-counter" class="subtitle-counter">Cargando...</p>
            <nav id="category-filters" class="filter-bar">
                <button class="filter-chip active" data-filter="destacados">Destacados</button>
                <button class="filter-chip" data-filter="hoy">Hoy</button>
                <button class="filter-chip" data-filter="semana">Esta Semana</button>
                <button class="filter-chip" data-filter="cerca">Cerca de Mí</button>
            </nav>
        </div>
    </header>

    <main class="container" id="main-content">
        <div id="list-wrapper">
            <div class="map-view-toggle-wrapper">
                <button id="show-map-btn" class="map-view-toggle-btn"><ion-icon name="map-outline"></ion-icon> Ver en el Mapa</button>
            </div>
            <div id="event-list-container">
                <!-- Las tarjetas de eventos se insertarán aquí -->
            </div>
        </div>
        <div id="desktop-map-container">
            <!-- Contenedor de mapa para la vista de escritorio -->
        </div>
    </main>

    <!-- Modal para el mapa en vista móvil -->
    <div id="map-modal-overlay" class="modal-overlay">
        <div class="map-modal-content">
            <button id="close-map-modal-btn" class="modal-close-btn">&times;</button>
            <div id="modal-map-container"></div>
        </div>
    </div>

    <nav id="bottom-nav">
        <!-- ... (iconos de navegación se mantienen igual) ... -->
    </nav>
    
    <script type="module" src="script.js"></script>
    <script type="module" src="chatbot.js"></script>

</body>

</html>
