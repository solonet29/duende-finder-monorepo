<!DOCTYPE html>
<html lang="es" data-theme="light">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buscador de Conciertos Flamencos - Duende Finder</title>
    <meta name="description"
        content="Descubre la magia del flamenco. Busca conciertos, tablaos y festivales por todo el Mundo.">
    <meta property="og:image"
        content="https://www.afland.es/wp-content/uploads/2024/04/DUENDE-FINDER-LOGO-1200-X-630-PX.png">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Inter:wght@400;700;900&family=Montserrat:wght@700&display=swap"
        rel="stylesheet">

    <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
    <script nomodule src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"></script>

    <link rel="icon" type="image/png" href="assets/favicon.png">
    <link rel="manifest" href="/assets/manifest.json">
    <meta name="theme-color" content="#121212">

    <!-- Leaflet.js - La librería para el mapa interactivo -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
        integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>

    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="chatbot.css">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>

<body>

    <!-- Modales (se mantienen sin cambios) -->
    <div id="welcome-modal-overlay" class="modal-overlay">
        <div class="modal">
            <div class="modal-content welcome-modal-content">
                <div class="sponsor-container">
                    <p>Un proyecto de:</p>
                    <a id="sponsor-link" href="#" target="_blank" rel="noopener noreferrer"><img id="sponsor-logo"
                            src="" alt="Logo del Patrocinador" class="sponsor-logo"></a>
                </div>
                <div id="welcome-banner-container" class="banner-container hidden">
                    <a id="banner-link" href="#" target="_blank" rel="noopener noreferrer"><img id="banner-image" src=""
                            alt="Banner promocional" class="banner-image"></a>
                </div>
                <div class="loading-indicator">
                    <ion-icon name="flame-outline"></ion-icon>
                    <p>Cargando tablaos...</p>
                </div>
            </div>
        </div>
    </div>
    <div id="how-it-works-modal-overlay" class="modal-overlay"></div>
    <div id="terms-modal-overlay" class="modal-overlay"></div>
    <div id="gemini-modal-overlay" class="modal-overlay"></div>
    <div id="event-detail-modal-overlay" class="modal-overlay"></div>
    <div id="image-modal-overlay" class="modal-overlay"></div>


    <header class="header-main">
        <div class="container">
            <h1 class="main-title">Duende Finder</h1>
            <p id="event-counter" class="subtitle-counter">Cargando eventos...</p>
            <nav id="category-filters" class="filter-bar">
                <button class="filter-chip active" data-filter="destacados">Destacados</button>
                <button class="filter-chip" data-filter="hoy">Hoy</button>
                <button class="filter-chip" data-filter="semana">Esta Semana</button>
                <button class="filter-chip" data-filter="cerca">Cerca de Mí</button>
            </nav>
        </div>
    </header>

    <main class="container" id="main-content">
        <div id="content-wrapper">
            <div id="event-list-container">
                <!-- Las tarjetas de eventos se insertarán aquí dinámicamente -->
            </div>
            <div id="map-container">
                <!-- El mapa de Leaflet se inicializará aquí -->
            </div>
        </div>
    </main>

    <nav id="bottom-nav">
        <button class="nav-btn active" id="nav-home-btn" title="Inicio"><ion-icon name="home"></ion-icon></button>
        <button class="nav-btn" id="nav-how-it-works-btn" title="Cómo Funciona"><ion-icon
                name="help-circle-outline"></ion-icon></button>
        <button class="nav-btn" id="nav-terms-btn" title="Términos"><ion-icon
                name="document-text-outline"></ion-icon></button>
        <button class="nav-btn" id="nav-notifications-btn" title="Notificaciones"><ion-icon name="notifications-outline"></ion-icon></button>
        <button class="nav-btn" id="nav-theme-toggle" title="Tema"><ion-icon name="moon-outline"></ion-icon></button>
        <a href="https://afland.es" target="_blank" rel="noopener noreferrer" class="nav-btn"
            title="Visitar Afland.es"><ion-icon name="flame-outline"></ion-icon></a>
    </nav>
    
    <script type="module" src="script.js"></script>
    <script type="module" src="chatbot.js"></script>

</body>

</html>
